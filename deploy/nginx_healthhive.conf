server {
    listen 80;
    # Replace with your EC2 public IP or domain name
    server_name _;

    # Max upload size for image search (OCR feature)
    client_max_body_size 10M;

    # Serve static files directly — bypasses Gunicorn entirely
    location /static {
        alias /home/ubuntu/HealthHive/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy all other requests to Gunicorn via Unix socket
    location / {
        include proxy_params;
        proxy_pass http://unix:/home/ubuntu/HealthHive/healthhive.sock;

        # Increase timeouts for slow Playwright scraping requests
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }
}
